<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pixelcount</title>
  <link rel="icon" href="data:,">

  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="coloris/coloris.css">
</head>
<body>
  <div class="toolbar">
    <img class="toolbar-logo" src="media/logo.svg" alt="Pixelcount">
    <button class="tool-btn" id="uploadBtn" title="Upload (U)">
      <i class="fa-solid fa-arrow-up-from-bracket" aria-hidden="true"></i>
    </button>
    <button class="tool-btn" id="exportBtn" title="Export (E)">
      <i class="fa-solid fa-download" aria-hidden="true"></i>
    </button>
    <button class="tool-btn" id="zoomInBtn" title="Zoom In (Scroll Wheel)">
      <i class="fa-solid fa-magnifying-glass-plus" aria-hidden="true"></i>
    </button>
    <button class="tool-btn" id="zoomOutBtn" title="Zoom Out (Scroll Wheel)">
      <i class="fa-solid fa-magnifying-glass-minus" aria-hidden="true"></i>
    </button>
    <button class="tool-btn" id="resetZoomBtn" title="Reset Zoom (1)">
      <i class="fa-solid fa-down-left-and-up-right-to-center" aria-hidden="true"></i>
    </button>
    <div class="toolbar-separator" aria-hidden="true"></div>
    <button class="tool-btn toggle-btn" id="mosaicBtn" title="Toggle Mosaic Filter (M)" aria-pressed="false">
      <i class="fa-solid fa-chess-board"></i>
    </button>
    <button class="tool-btn toggle-btn active" id="gridVisBtn" title="Toggle Grid (G)" aria-pressed="true">
      <i class="fa-solid fa-border-none"></i>
    </button>
    <button class="tool-btn" id="deleteGridBtn" title="Delete Grid (X)">
      <i class="fa-solid fa-trash" aria-hidden="true"></i>
    </button>
    <div class="tool-info" title="Estimated resolution based on the grid size & image crop values.">
      <span class="tool-info-label">Resolution</span>
      <span class="tool-info-value" id="resolutionValue">&mdash;</span>
    </div>
  </div>
  <div id="app">
    <canvas id="canvas"></canvas>
    <div class="floating-stack hidden" id="floatingStack">
      <div id="floating-control-bg"></div>
      <div class="floating-control" id="cropControl" title="Crop amounts from each edge of the source image.">
        <span class="island-title">Image Crop</span>
        <br><br>
        <div class="crop-grid">
          <label class="crop-field">
            <span class="floating-label">Top</span>
            <input id="cropTopInput" type="number" min="0" step="1" value="0" aria-label="Top crop amount">
          </label>
          <label class="crop-field">
            <span class="floating-label">Bottom</span>
            <input id="cropBottomInput" type="number" min="0" step="1" value="0" aria-label="Bottom crop amount">
          </label>
          <label class="crop-field">
            <span class="floating-label">Left</span>
            <input id="cropLeftInput" type="number" min="0" step="1" value="0" aria-label="Left crop amount">
          </label>
          <label class="crop-field">
            <span class="floating-label">Right</span>
            <input id="cropRightInput" type="number" min="0" step="1" value="0" aria-label="Right crop amount">
          </label>
        </div>
      </div>
      <div class="floating-control hidden" id="gridCellsControl" title="Number of horizontal and vertical pixels inside the grid box. Right-click and drag on the image to draw a grid.">
        <span class="island-title">Grid Cells</span>
        <br><br>
        <div class="cells-row">
          <span class="floating-label">Horizontal Cells</span>
          <div class="grid-controls">
            <button id="gridDecBtnX" class="step-btn" type="button" aria-label="Decrease horizontal pixels (Left)">
              <i class="fa-solid fa-minus"></i>
            </button>
            <input id="gridInputX" value="8" type="number" min="0" step="1" aria-label="Horizontal pixels">
            <button id="gridIncBtnX" class="step-btn" type="button" aria-label="Increase horizontal pixels (Right)">
              <i class="fa-solid fa-plus"></i>
            </button>
          </div>
        </div>
        <div class="cells-row">
          <span class="floating-label">Vertical Cells</span>
          <div class="grid-controls">
            <button id="gridDecBtnY" class="step-btn" type="button" aria-label="Decrease vertical pixels (Down)">
              <i class="fa-solid fa-minus"></i>
            </button>
            <input id="gridInputY" value="8" type="number" min="0" step="1" aria-label="Vertical pixels">
            <button id="gridIncBtnY" class="step-btn" type="button" aria-label="Increase vertical pixels (Up)">
              <i class="fa-solid fa-plus"></i>
            </button>
          </div>
        </div>
        <div class="cells-row">
          <span class="floating-label">Grid Opacity</span>
          <input type="range" id="gridOpacityInput" min="0" max="1" step="0.01" value="1" aria-label="Cell opacity">
        </div>
        <div class="cells-row">
          <span class="floating-label">Grid Color</span>
          <input type="text" id="gridColorInput" class="coloris" value="#78d2ff" aria-label="Grid color">
        </div>
      </div>
      <div class="floating-control hidden" id="gridTransformControl" title="Nudge individual grid edges. Each button moves an edge by the nudge amount; the opposite edge stays fixed.">
        <span class="island-title">Grid Transform</span>
        <br><br>
        <div class="transform-grid">
          <div class="transform-box" aria-hidden="true"></div>
          <button class="transform-btn" id="topOutBtn" type="button" title="Move Top Edge Up (Shift + W)" aria-label="Move Top Edge Up (Shift + W)">
            <i class="fa-solid fa-angle-up"></i>
          </button>
          <button class="transform-btn" id="topInBtn" type="button" title="Move Top Edge Down (Ctrl + S)" aria-label="Move Top Edge Down (Ctrl + S)">
            <i class="fa-solid fa-angle-down"></i>
          </button>
          <button class="transform-btn" id="leftOutBtn" type="button" title="Move Left Edge Left (Shift + A)" aria-label="Move Left edge left">
            <i class="fa-solid fa-angle-left"></i>
          </button>
          <button class="transform-btn" id="leftInBtn" type="button" title="Move Left Edge Right (Ctrl + D)" aria-label="Move Left edge right">
            <i class="fa-solid fa-angle-right"></i>
          </button>
          <button class="transform-btn" id="rightInBtn" type="button" title="Move Right Edge Left (Ctrl + A)" aria-label="Move Right edge left">
            <i class="fa-solid fa-angle-left"></i>
          </button>
          <button class="transform-btn" id="rightOutBtn" type="button" title="Move Right Edge Right (Shift + D)" aria-label="Move Right edge right">
            <i class="fa-solid fa-angle-right"></i>
          </button>
          <button class="transform-btn" id="bottomInBtn" type="button" title="Move Bottom Edge Up (Ctrl + W)" aria-label="Move Bottom Edge Up (Ctrl + W)">
            <i class="fa-solid fa-angle-up"></i>
          </button>
          <button class="transform-btn" id="bottomOutBtn" type="button" title="Move Bottom Edge Down (Shift + S)" aria-label="Move Bottom Edge Down (Shift + S)">
            <i class="fa-solid fa-angle-down"></i>
          </button>
        </div>
        <br>
        <div class="nudge-row">
          <span class="floating-label">Nudge Amount</span>
          <div class="grid-controls">
            <button id="nudgeDecBtn" class="step-btn" type="button" aria-label="Decrease nudge amount">
              <i class="fa-solid fa-minus"></i>
            </button>
            <input id="nudgeInput" value=".05" aria-label="Nudge amount">
            <button id="nudgeIncBtn" class="step-btn" type="button" aria-label="Increase nudge amount">
              <i class="fa-solid fa-plus"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
    <div id="dropzone" class="dropzone">
      <p>
        Drag & drop an image, or
        <label class="file-label">
          click here
          <input type="file" id="fileInput" accept="image/*" hidden>
        </label>
        to choose an image file.
      </p>
    </div>
  </div>
  <div class="statusbar">
    <div class="status-field">
      <i class="fa-solid fa-maximize"></i>
      <span class="status-label">Source Resolution</span>
      <span class="status-value" id="sourceResolution">&mdash;</span>
    </div>
    <div class="statusbar-separator" aria-hidden="true"></div>
    <div class="status-field">
      <i class="fa-solid fa-arrow-pointer"></i>
      <span class="status-label">Cursor Position (Source)</span>
      <span class="status-value" id="cursorPosition">&mdash;</span>
    </div>
    <div class="statusbar-separator" aria-hidden="true"></div>
    <div class="status-field">
      <i class="fa-regular fa-square"></i>
      <span class="status-label">Cursor Position (Grid)</span>
      <span class="status-value" id="pixelPosition">&mdash;</span>
    </div>
  </div>
  <script src="coloris/coloris.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
